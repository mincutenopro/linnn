<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hà Linh ơi QV1 với am nhá 🎉</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui;background:linear-gradient(135deg,#ff9a9e 0%,#fecfef 50%,#fecfef 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;}
        .music-control{position:fixed;top:20px;right:20px;z-index:1000;background:linear-gradient(45deg,#ff6b9d,#c44569);color:white;border-radius:50px;padding:15px 20px;cursor:pointer;box-shadow:0 10px 30px rgba(255,107,157,.4);transition:all .3s;font-weight:600;}
        .music-control:hover{transform:scale(1.1);}
        .music-control.playing{background:linear-gradient(45deg,#ff1744,#ff6b9d);}
        .volume-container{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.95);padding:15px 25px;border-radius:25px;opacity:0;visibility:hidden;transition:all .3s;}
        .volume-container.show{opacity:1;visibility:visible;}
        .volume-slider{width:150px;height:5px;border-radius:5px;background:#ddd;outline:none;-webkit-appearance:none;margin:0 10px;}
        .volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#ff6b9d;cursor:pointer;}
        .container{background:rgba(255,255,255,.95);padding:3rem 2rem;border-radius:30px;box-shadow:0 20px 40px rgba(0,0,0,.1);text-align:center;max-width:90vw;animation:slideIn 1s ease-out;backdrop-filter:blur(10px);}
        @keyframes slideIn{from{opacity:0;transform:translateY(50px);}to{opacity:1;transform:translateY(0);}}
        .emoji{font-size:4rem;margin-bottom:1rem;animation:bounce 2s infinite;}
        @keyframes bounce{0%,20%,50%,80%,100%{transform:translateY(0);}40%{transform:translateY(-20px);}60%{transform:translateY(-10px);}}
        .title{font-size:3rem;background:linear-gradient(45deg,#ff6b9d,#c44569);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem;font-family:'Dancing Script',cursive;}
        .message{font-size:1.3rem;color:#333;line-height:1.6;margin-bottom:2rem;}
        .highlight{background:linear-gradient(120deg,#ff6b9d,#ff9ff3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;font-size:1.5rem;}
        .friend-name{color:#c44569;font-weight:700;font-size:1.4rem;}
        .button{background:linear-gradient(45deg,#ff6b9d,#c44569);color:white;border:none;padding:15px 30px;font-size:1.1rem;font-weight:600;border-radius:50px;cursor:pointer;transition:all .3s;box-shadow:0 10px 20px rgba(255,107,157,.3);margin:10px;text-decoration:none;display:inline-block;}
        .button:hover{transform:translateY(-3px);box-shadow:0 15px 30px rgba(255,107,157,.4);}
        .confetti{position:absolute;width:10px;height:10px;background:#ff6b9d;animation:confetti-fall 3s linear infinite;border-radius:50%;}
        @keyframes confetti-fall{0%{transform:translateY(-100vh) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
        @media(max-width:480px){.container{padding:2rem 1.5rem;margin:1rem;}.title{font-size:2.2rem;}.emoji{font-size:3rem;}}
    </style>
</head>
<body>
    <!-- NÚT NHẠC + VOLUME -->
    <div class="music-control" id="musicControl" onclick="toggleMusic()">💖 Hẹn Lần Sau</div>
    <div class="volume-container" id="volumeContainer">
        <span>🔊</span>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50">
        <span id="volumeValue">50%</span>
    </div>

    <div class="container">
        <div class="emoji">🎉✨💕</div>
        <h1 class="title">CHÚC MỪNG!</h1>
        <p class="message">
            <span class="friend-name">HÀ LINH</span> ơi! 🌸<br><br>
            <span class="highlight">Phải Đỗ NV1 để còn học với t nhé linhh!!!</span> 🎊<br><br>
            Mày làm được mà! 💖<br>
            Tao biết mày cũng muốn học cùng tao mà,<br>
            cố gắng lên để những ng ghét m phải hết hồn vì mày! ✨<br>
            <strong>Bestie yêu dấu nhất! 🥰</strong>
        </p>
        <a href="#" class="button" onclick="createConfetti()">Cưng Hà Linh nhất trên đời! 💕</a>
        <a href="#" class="button" onclick="createConfetti()">Cố Lênnnnn! 🎉</a>
    </div>

<!-- NHẠC ONLINE -->
<audio id="bgMusic" loop preload="auto">
    <source src="https://raw.githubusercontent.com/mincutenopro/h-n-l-n-sau/main/hen_lan_sau.mp3" type="audio/mpeg">
</audio>

    <script>
        const music = document.getElementById('bgMusic');
        const musicControl = document.getElementById('musicControl');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeValue = document.getElementById('volumeValue');
        const volumeContainer = document.getElementById('volumeContainer');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                musicControl.innerHTML = '💖 Hẹn Lần Sau';
                musicControl.classList.remove('playing');
                isPlaying = false;
            } else {
                music.play();
                musicControl.innerHTML = '💕 Tắt nhạc';
                musicControl.classList.add('playing');
                isPlaying = true;
                createConfetti();
            }
        }

        volumeSlider.oninput = function() {
            music.volume = this.value / 100;
            volumeValue.textContent = this.value + '%';
        };

        musicControl.onmouseenter = () => volumeContainer.classList.add('show');
        musicControl.onmouseleave = () => volumeContainer.classList.remove('show');

        function createConfetti() {
            for(let i = 0; i < 150; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.className = 'confetti';
                    c.style.left = Math.random() * 100 + '%';
                    c.style.background = `hsl(${320 + Math.random() * 40}, 80%, 70%)`;
                    c.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 5000);
                }, i * 30);
            }
        }

        setInterval(() => {
            for(let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.className = 'confetti';
                    c.style.left = Math.random() * 100 + '%';
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 5000);
                }, i * 200);
            }
        }, 4000);

        document.onclick = createConfetti;
    </script>
</body>
</html>
